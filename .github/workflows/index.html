<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bienvenue</title>
    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .box{
            text-align:center;
            background:rgba(0,0,0,0.5);
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
        }

        p{
            font-size:18px;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#00c6ff;
            color:white;
        }

        button:hover{
            background:#0072ff;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Bienvenue 👋</h1>
    <p>Bienvenue sur mon site web</p>
    <button onclick="message()">Commencer</button>
</div>

<script>
function message(){
    alert("Bienvenue sur le site Junior !");
}
</script>

</body>
</html>
